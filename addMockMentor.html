    }
    .status {

    }
    .success {

      color: #155724;
      border: 1px solid #c3e6cb;

    .error {

      border: 1px solid #bee5eb;

    // Display first mentor details
    document.getElementById('mentorDetails').textContent = JSON.stringify(mockMentors[0], null, 2);

    window.addMockMentor = async function() {
      const statusDiv = document.getElementById('status');
      statusDiv.style.display = 'block';
      statusDiv.className = 'status info';
      statusDiv.textContent = 'Adding mentor...';

      try {
        const mentor = mockMentors[0];
        await setDoc(doc(db, 'users', mentor.id), mentor);
        
        statusDiv.className = 'status success';
        statusDiv.innerHTML = `
          <strong>✅ Success!</strong><br>
          Mentor added: ${mentor.name}<br>
          ID: ${mentor.id}<br>
          Subjects: ${mentor.subjects.join(', ')}<br><br>
          <strong>Now refresh your LearnSync app to see the mentor!</strong>
        `;
      } catch (error) {
        statusDiv.className = 'status error';
        statusDiv.innerHTML = `
          <strong>❌ Error:</strong><br>
          ${error.message}<br><br>
          Make sure Firestore rules allow write access.
        `;
        console.error('Error adding mentor:', error);
      }
    };

    window.addMultipleMentors = async function() {
      const statusDiv = document.getElementById('status');
      statusDiv.style.display = 'block';
      statusDiv.className = 'status info';
      statusDiv.textContent = 'Adding 6 mentors...';

      try {
        for (const mentor of mockMentors) {
          await setDoc(doc(db, 'users', mentor.id), mentor);
          console.log(`Added mentor: ${mentor.name}`);
        }
        
        statusDiv.className = 'status success';
        statusDiv.innerHTML = `
          <strong>✅ Success!</strong><br>
          Added 6 mentors:<br>
          1. ${mockMentors[0].name} (${mockMentors[0].subjects.join(', ')})<br>
