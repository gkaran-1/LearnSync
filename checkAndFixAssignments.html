<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Check & Fix Student-Mentor Assignments</title>
  <style>
    body { font-family: Arial; max-width: 1000px; margin: 20px auto; padding: 20px; }
    .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    button:hover { background: #45a049; }
    .log { background: #f5f5f5; padding: 15px; margin-top: 20px; border-radius: 5px; max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    .info { color: #2196F3; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #4CAF50; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Check & Fix Student-Mentor Assignments</h1>
    
    <button onclick="checkFirestore()">Check Firestore Data</button>
    <button onclick="fixAssignments()">Fix Missing Assignments</button>
    
    <div id="tables"></div>
    <div class="log" id="log"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBGO0asOWPGMlFWpsY11l5svQnR7jjWcCI",
      authDomain: "learnsync-dd2d7.firebaseapp.com",
      projectId: "learnsync-dd2d7",
      storageBucket: "learnsync-dd2d7.firebasestorage.app",
      messagingSenderId: "597943458243",
      appId: "1:597943458243:web:187b4f49700b88221f4576"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = type;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    window.checkFirestore = async function() {
      log('🔍 Checking Firestore data...', 'info');
      
      try {
        const usersSnapshot = await getDocs(collection(db, 'users'));
        const students = [];
        const mentors = [];
        
        usersSnapshot.forEach(doc => {
          const data = { id: doc.id, ...doc.data() };
          if (data.role === 'student') students.push(data);
          if (data.role === 'mentor') mentors.push(data);
        });
        
        log(`Found ${students.length} students and ${mentors.length} mentors`, 'success');
        
        // Display students table
        let studentsTable = '<h3>Students</h3><table><tr><th>ID</th><th>Name</th><th>Mentor ID</th><th>Status</th></tr>';
        students.forEach(s => {
          const status = s.mentorId ? '✅ Assigned' : '❌ No Mentor';
          studentsTable += `<tr><td>${s.id}</td><td>${s.name || 'N/A'}</td><td>${s.mentorId || 'None'}</td><td>${status}</td></tr>`;
        });
        studentsTable += '</table>';
        
        // Display mentors table
        let mentorsTable = '<h3>Mentors</h3><table><tr><th>ID</th><th>Name</th><th>Assigned Students</th><th>Count</th></tr>';
        mentors.forEach(m => {
          const count = m.assignedStudents?.length || 0;
          const studentList = m.assignedStudents?.join(', ') || 'None';
          mentorsTable += `<tr><td>${m.id}</td><td>${m.name || 'N/A'}</td><td>${studentList}</td><td>${count}</td></tr>`;
        });
        mentorsTable += '</table>';
        
        document.getElementById('tables').innerHTML = studentsTable + mentorsTable;
        
        // Check for issues
        const studentsWithoutMentor = students.filter(s => !s.mentorId);
        if (studentsWithoutMentor.length > 0) {
          log(`⚠️ ${studentsWithoutMentor.length} students without mentors`, 'error');
        }
        
      } catch (e) {
        log('❌ Error: ' + e.message, 'error');
      }
    };

    window.fixAssignments = async function() {
      log('🔧 Fixing assignments...', 'info');
      
      try {
        const usersSnapshot = await getDocs(collection(db, 'users'));
        const students = [];
        const mentors = [];
        
        usersSnapshot.forEach(doc => {
          const data = { id: doc.id, ...doc.data() };
          if (data.role === 'student') students.push(data);
          if (data.role === 'mentor') mentors.push(data);
        });
        
        if (mentors.length === 0) {
          log('❌ No mentors found in database', 'error');
          return;
        }
        
        // Fix students without mentors
        const studentsWithoutMentor = students.filter(s => !s.mentorId);
        
        for (const student of studentsWithoutMentor) {
          // Assign to mentor with fewest students
          const mentorCounts = mentors.map(m => ({
            id: m.id,
            count: m.assignedStudents?.length || 0
          }));
          mentorCounts.sort((a, b) => a.count - b.count);
          const assignedMentor = mentorCounts[0];
          
          // Update student
          await updateDoc(doc(db, 'users', student.id), {
            mentorId: assignedMentor.id
          });
          
          // Update mentor
          const mentor = mentors.find(m => m.id === assignedMentor.id);
          const updatedStudents = [...(mentor.assignedStudents || []), student.id];
          await updateDoc(doc(db, 'users', assignedMentor.id), {
            assignedStudents: updatedStudents
          });
          
          log(`✅ Assigned ${student.name || student.id} to ${assignedMentor.id}`, 'success');
        }
        
        log('✅ All assignments fixed!', 'success');
        log('Click "Check Firestore Data" to verify', 'info');
        
      } catch (e) {
        log('❌ Error: ' + e.message, 'error');
      }
    };

    log('Ready! Click "Check Firestore Data" to start', 'info');
  </script>
</body>
</html>
